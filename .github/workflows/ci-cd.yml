name: ci-cd-devsecops

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint_static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Composer validate
        run: composer validate --strict
      - name: PHP lint
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Symfony lint container
        run: php bin/console lint:container

  unit_tests:
    runs-on: ubuntu-latest
    needs: lint_static
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Unit tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=unit --log-junit var/log/junit-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-unit
          path: var/log/junit-unit.xml

  integration_tests:
    runs-on: ubuntu-latest
    needs: lint_static
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lpmde
          POSTGRES_USER: lpmde
          POSTGRES_PASSWORD: lpmde
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lpmde -d lpmde"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Integration + functional tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://lpmde:lpmde@127.0.0.1:5432/lpmde?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: amqp://guest:guest@127.0.0.1:5672/%2f/messages
        run: |
          php bin/phpunit --testsuite=integration --log-junit var/log/junit-integration.xml
          php bin/phpunit --testsuite=functional --log-junit var/log/junit-functional.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-integration
          path: |
            var/log/junit-integration.xml
            var/log/junit-functional.xml

  build_and_scan:
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t lpmde:${{ github.sha }} .
      - name: Export image to tar
        run: docker save lpmde:${{ github.sha }} -o /tmp/lpmde-image.tar
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          input: /tmp/lpmde-image.tar
          severity: HIGH,CRITICAL
          format: table
          output: trivy-image-report.txt
          exit-code: '0'
      - name: Composer audit
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          composer audit --format=plain | tee composer-audit-report.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-security
          path: |
            trivy-image-report.txt
            composer-audit-report.txt
