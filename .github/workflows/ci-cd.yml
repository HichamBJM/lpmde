name: ci-cd

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PHP_VERSION: '8.2'
  DB_USER: 'ci_user'
  DB_PASSWORD: 'ci_password'

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo, pdo_pgsql, xml, ctype, iconv
          tools: composer

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  unit-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo, pdo_pgsql, xml, ctype, iconv

      - name: Run unit tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=unit --no-coverage

  functional-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo, pdo_pgsql, xml, ctype, iconv

      - name: Run functional tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=functional --no-coverage

  e2e-test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo, pdo_pgsql, xml, ctype, iconv

      - name: Run e2e tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=e2e --no-coverage

  sast-php-lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: PHP syntax lint
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

  sast-composer-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer

      - name: Composer audit
        run: composer audit || true

  trivy-fs-audit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy filesystem audit
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '0'

  dast-zap-baseline:
    runs-on: ubuntu-latest
    needs: [install, functional-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Start application
        env:
          APP_ENV: test
          APP_DEBUG: '0'
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: |
          php -S 127.0.0.1:8000 -t public > /tmp/php-server.log 2>&1 &
          sleep 3
          curl -I http://127.0.0.1:8000

      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://127.0.0.1:8000
          fail_action: false
          allow_issue_writing: false
          cmd_options: -a

  sonar-audit:
    runs-on: ubuntu-latest
    needs: [unit-test, functional-test, e2e-test]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: SonarCloud skipped (missing SONAR_TOKEN)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured, skipping sonar-audit job."

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-test, functional-test, e2e-test, sast-php-lint, sast-composer-audit, trivy-fs-audit]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.repo }}:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-image, dast-zap-baseline]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy to staging (placeholder)
        run: echo "Deploy staging with Helm/SSH/Kubectl here"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-image, sonar-audit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://production.example.com
    steps:
      - name: Deploy to production (placeholder)
        run: echo "Deploy production with Helm/ArgoCD/Kubectl here"
