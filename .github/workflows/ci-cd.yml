name: ci-cd-devsecops

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PHP_VERSION: '8.2'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-
      - run: composer install --prefer-dist --no-interaction --no-progress
      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor

  lint_static:
    runs-on: ubuntu-latest
    needs: lint_static
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - run: composer validate --strict
      - run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php bin/console lint:container

  test_unit_test:
    name: unit-test
    runs-on: ubuntu-latest
    needs: lint_static
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: Unit tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=unit --log-junit var/log/junit-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-unit
          path: var/log/junit-unit.xml

  test_e2e_test_job:
    name: e2e-test-job
    runs-on: ubuntu-latest
    needs: lint_static
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lpmde
          POSTGRES_USER: lpmde
          POSTGRES_PASSWORD: lpmde
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lpmde -d lpmde"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management
        ports: ["5672:5672"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: Migration + tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://lpmde:lpmde@127.0.0.1:5432/lpmde?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: amqp://guest:guest@127.0.0.1:5672/%2f/messages
        run: |
          php bin/console doctrine:migrations:migrate -n --allow-no-migration
          php bin/phpunit --testsuite=integration --log-junit var/log/junit-integration.xml
          php bin/phpunit --testsuite=functional --log-junit var/log/junit-functional.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-e2e
          path: |
            var/log/junit-integration.xml
            var/log/junit-functional.xml

  test_sast_npm_audit:
    name: sast-npm-audit
    runs-on: ubuntu-latest
    needs: lint_static
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - run: composer audit --format=plain | tee composer-audit-report.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-sast
          path: composer-audit-report.txt

  test_sonar_audit:
    name: sonar-audit
    runs-on: ubuntu-latest
    needs: lint_static
    if: github.event_name == 'push'
    steps:
      - run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "SONAR_TOKEN non défini: audit Sonar ignoré sans échec."
            exit 0
          fi
          echo "SONAR_TOKEN détecté: intégrer ici sonar-scanner."

  test_trivy_fs_audit:
    name: trivy-fs-audit
    runs-on: ubuntu-latest
    needs: lint_static
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          output: trivy-fs-report.txt
          exit-code: '0'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-trivy-fs
          path: trivy-fs-report.txt

  release_build_image_job:
    name: build-image-job
    runs-on: ubuntu-latest
    needs:
      - test_unit_test
      - test_e2e_test_job
      - test_sast_npm_audit
      - test_sonar_audit
      - test_trivy_fs_audit
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  staging_deploy_staging_job:
    name: deploy-staging-job
    runs-on: ubuntu-latest
    needs: release_build_image_job
    if: github.event_name == 'push'
    steps:
      - run: |
          if [ -z "${{ secrets.STAGING_SSH_HOST }}" ] || [ -z "${{ secrets.STAGING_SSH_USER }}" ]; then
            echo "Secrets de staging non définis: déploiement staging ignoré sans échec."
            exit 0
          fi
          echo "Préparer ici: ssh + docker compose pull/up ou ansible pour staging."
