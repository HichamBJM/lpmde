name: ci-cd-devsecops

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PHP_VERSION: '8.2'

jobs:
  quality_checks:
    name: quality-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer validate --strict --no-check-lock
      - run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php bin/console lint:container

  unit_tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: quality_checks
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Unit tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///%kernel.project_dir%/var/test.db
        run: php bin/phpunit --testsuite=unit --log-junit var/log/junit-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-unit
          path: var/log/junit-unit.xml

  integration_functional_tests:
    name: integration-functional-tests
    runs-on: ubuntu-latest
    needs: quality_checks
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lpmde
          POSTGRES_USER: lpmde
          POSTGRES_PASSWORD: lpmde
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lpmde -d lpmde"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Migration + tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://lpmde:lpmde@127.0.0.1:5432/lpmde?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: amqp://guest:guest@127.0.0.1:5672/%2f/messages
          PGPASSWORD: lpmde
        run: |
          TARGET_DB="lpmde_test${TEST_TOKEN:-}"
          if ! psql -h 127.0.0.1 -U lpmde -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${TARGET_DB}'" | grep -q 1; then
            createdb -h 127.0.0.1 -U lpmde "${TARGET_DB}"
          fi

          php bin/console doctrine:migrations:migrate -n --allow-no-migration
          php bin/phpunit --testsuite=integration --log-junit var/log/junit-integration.xml
          php bin/phpunit --testsuite=functional --log-junit var/log/junit-functional.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-integration-functional
          path: |
            var/log/junit-integration.xml
            var/log/junit-functional.xml

  composer_audit:
    name: composer-audit
    runs-on: ubuntu-latest
    needs: quality_checks
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer audit --format=plain | tee composer-audit-report.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-composer-audit
          path: composer-audit-report.txt

  trivy_fs_scan:
    name: trivy-fs-scan
    runs-on: ubuntu-latest
    needs: quality_checks
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          output: trivy-fs-report.txt
          exit-code: '0'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-trivy-fs
          path: trivy-fs-report.txt

  build_image:
    name: build-image
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - integration_functional_tests
      - composer_audit
      - trivy_fs_scan
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Prepare lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

  deploy_staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: build_image
    if: github.event_name == 'push'
    steps:
      - name: Validate staging secrets
        id: validate_staging
        run: |
          if [ -z "${{ secrets.STAGING_SSH_HOST }}" ] || [ -z "${{ secrets.STAGING_SSH_USER }}" ] || [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            echo "Déploiement staging ignoré: secrets SSH incomplets (STAGING_SSH_HOST/STAGING_SSH_USER/STAGING_SSH_KEY)." >&2
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Deploy full HTTPS demo stack on staging
        if: steps.validate_staging.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.STAGING_APP_DIR || '/opt/lpmde' }}"
            REPO_URL="${{ secrets.STAGING_REPO_URL || format('https://github.com/{0}.git', github.repository) }}"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              sudo mkdir -p "${APP_DIR}"
              sudo chown -R "$USER":"$USER" "${APP_DIR}"
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch --all --prune
            git checkout "${BRANCH}" || git checkout -B "${BRANCH}" "origin/${BRANCH}"
            git reset --hard "origin/${BRANCH}"

            export IMAGE_TAG="${{ github.sha }}"
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"

            docker compose -f docker-compose.demo.yml pull app worker || true
            docker compose -f docker-compose.demo.yml up -d --build --force-recreate
            ./scripts/demo_seed.sh

            echo "Stack HTTPS déployée avec modules: app, rabbitmq, keycloak, prometheus, grafana."
