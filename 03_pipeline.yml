name: poc-devsecops

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Validate architecture POC
        run: |
          test -f 09_code_poc/controllers/ProductController.php
          test -f 09_code_poc/models/Product.php
          test -f 09_code_poc/services/ProductService.php

  unit_tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite unit || ./vendor/bin/phpunit

  integration_tests:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: lpmde
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer install --no-interaction --prefer-dist
      - name: Integration smoke tests
        env:
          DATABASE_URL: postgresql://app:app@localhost:5432/lpmde
        run: |
          php -v
          ./vendor/bin/phpunit --group integration || echo "Aucun test d'intégration taggé"

  security_scans:
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests]
    steps:
      - uses: actions/checkout@v4
      - name: Dependency audit
        run: composer audit || true
      - name: SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  deploy_staging:
    runs-on: ubuntu-latest
    needs: security_scans
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
      - name: Push image (example)
        run: |
          echo "Configurer ici login GHCR + push"
      - name: Deploy to staging (example)
        run: |
          echo "helm upgrade --install lpmde ./k8s/chart --namespace staging --set image.tag=${{ github.sha }}"
