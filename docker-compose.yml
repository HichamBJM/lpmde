version: '3.8'

services:
  web:
    image: ${CI_REGISTRY_IMAGE:-lpmde}:${IMAGE_TAG:-latest}
    container_name: lpmde-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:-ChangeMeInProd}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lpmde:lpmde@db:5432/lpmde?serverVersion=16&charset=utf8}
    volumes:
      - ./var/log:/var/www/html/var/log
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lpmde-network

  db:
    image: postgres:16-alpine
    container_name: lpmde-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lpmde}
      POSTGRES_USER: ${POSTGRES_USER:-lpmde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lpmde}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lpmde} -d ${POSTGRES_DB:-lpmde}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - lpmde-network

networks:
  lpmde-network:
    driver: bridge

volumes:
  db-data:
