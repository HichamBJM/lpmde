apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lpmde-ingress
  namespace: lpmde-production
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: lpmde.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lpmde-service
            port:
              number: 80
